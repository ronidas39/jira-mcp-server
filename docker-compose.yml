services:
  mongodb:
    image: mongo:7
    container_name: jira-mcp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jira-mcp-server
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside the compose network, reach Mongo by service name.
      MONGO_URI: mongodb://mongodb:27017
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-8765}
      # The web UI runs on host port 3000 by default; allow it through CORS.
      MCP_CORS_ORIGINS: ${MCP_CORS_ORIGINS:-http://localhost:3000,http://web:3000}
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      # Only the HTTP transport listens on a port; stdio runs ignore this mapping.
      - "${MCP_HTTP_PORT:-8765}:${MCP_HTTP_PORT:-8765}"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: jira-mcp-web
    restart: unless-stopped
    environment:
      MCP_SERVER_URL: http://server:8765/mcp
      JIRA_BROWSE_URL: ${JIRA_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
    depends_on:
      - server
    ports:
      - "3000:3000"
    profiles:
      # Opt-in: `docker compose --profile ui up` brings the UI online too.
      # Default `docker compose up` keeps the stack lean for headless deploys.
      - ui

volumes:
  mongo_data:
